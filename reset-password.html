<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventPass — Reset Password</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'><path d='M 25 15 H 42 A 8 8 0 0 0 58 15 H 75 A 10 10 0 0 1 85 25 V 95 A 10 10 0 0 1 75 105 H 58 A 8 8 0 0 0 42 105 H 25 A 10 10 0 0 1 15 95 V 25 A 10 10 0 0 1 25 15 Z' fill='%2316A34A'/><rect x='23' y='27' width='54' height='54' rx='8' ry='8' fill='white'/><circle cx='50' cy='42' r='7' fill='%2316A34A'/><path d='M 36 60 C 36 52, 64 52, 64 60 Z' fill='%2316A34A'/><rect x='34' y='66' width='32' height='3.5' rx='1.75' fill='%23E2EDE9'/><rect x='34' y='73' width='20' height='3.5' rx='1.75' fill='%23E2EDE9'/><circle cx='76' cy='90' r='17' fill='white'/><circle cx='76' cy='90' r='13.5' fill='%2316A34A'/><path d='M 70 90 L 74 94 L 82 86' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">

  <!-- Supabase Credentials (reads same as app.html) -->
  <meta name="supabase-url" content="https://srsxjaoabhyagpukslyk.supabase.co">
  <meta name="supabase-anon-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyc3hqYW9hYmh5YWdwdWtzbHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDcxNzksImV4cCI6MjA5Njc4MzE3OX0.xPSRlh8srEkXeQkP70lfZ7JspZvjMZSl1PkSSOvHO9o">

  <link rel="stylesheet" href="/src/assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>

  <style>
    html { background: #F7FAF8; }
    body { background: #F7FAF8; }
    .card-loading { text-align: center; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" id="auth-card-container">
      <div class="card-loading">
        <div class="loading-spinner lg"></div>
        <p style="margin-top:16px;color:var(--color-text-muted);font-size:14px;">Verifying recovery session...</p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('auth-card-container');

      // 1. Read Supabase config
      const urlEl = document.querySelector('meta[name="supabase-url"]');
      const keyEl = document.querySelector('meta[name="supabase-anon-key"]');
      if (!urlEl || !keyEl) {
        renderError("Supabase credentials not configured in meta tags.");
        return;
      }

      const supabaseUrl = urlEl.getAttribute('content');
      const supabaseKey = keyEl.getAttribute('content');

      // Initialize Supabase Client
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey, {
        auth: {
          persistSession: false,
          detectSessionInUrl: true
        }
      });

      // 2. Parse URL hashes & query parameters
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const searchParams = new URLSearchParams(window.location.search);

      // Check for errors appended by Supabase
      const error = hashParams.get('error') || searchParams.get('error');
      const errorCode = hashParams.get('error_code') || searchParams.get('error_code');
      const errorDesc = hashParams.get('error_description') || searchParams.get('error_description');

      if (error || errorCode || errorDesc) {
        renderError(errorDesc || 'This password reset link is invalid or has expired.', errorCode === 'otp_expired' ? 'Expired Reset Link' : 'Invalid Reset Link');
        return;
      }

      // Allow a small delay for Supabase to process URL session if present
      await new Promise(resolve => setTimeout(resolve, 500));

      // Check if we have an authenticated user session
      const { data: { session } } = await supabase.auth.getSession();
      const user = session?.user;

      if (!user) {
        renderError("A valid password reset session could not be established. Please request a new reset link.", "Missing or Expired Token");
        return;
      }

      // Render reset form
      renderResetForm(container, supabase);
    });

    function renderError(message, title = "Verification Error") {
      const container = document.getElementById('auth-card-container');
      container.innerHTML = `
        <div class="auth-logo">
          <div class="auth-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="36" height="36" fill="none"><path d="M 25 15 H 42 A 8 8 0 0 0 58 15 H 75 A 10 10 0 0 1 85 25 V 95 A 10 10 0 0 1 75 105 H 58 A 8 8 0 0 0 42 105 H 25 A 10 10 0 0 1 15 95 V 25 A 10 10 0 0 1 25 15 Z" fill="#16A34A" /><rect x="23" y="27" width="54" height="54" rx="8" ry="8" fill="white" /><circle cx="50" cy="42" r="7" fill="#16A34A" /><path d="M 36 60 C 36 52, 64 52, 64 60 Z" fill="#16A34A" /><rect x="34" y="66" width="32" height="3.5" rx="1.75" fill="#E2EDE9" /><rect x="34" y="73" width="20" height="3.5" rx="1.75" fill="#E2EDE9" /><circle cx="76" cy="90" r="17" fill="white" /><circle cx="76" cy="90" r="13.5" fill="#16A34A" /><path d="M 70 90 L 74 94 L 82 86" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg></div>
          <span class="auth-logo-text">EventPass</span>
        </div>
        <h1 class="auth-title" style="margin-top:16px;">${title}</h1>
        <p class="auth-subtitle">${message}</p>
        <div class="field-error" style="display:block;margin-bottom:20px;text-align:center;padding:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:13px;line-height:1.5;">
          Please go back to the sign in page and request a new password reset link.
        </div>
        <p class="text-sm text-muted text-center mt-6">
          <a href="/app#/login">Back to sign in</a>
        </p>
      `;
    }

    function renderResetForm(container, supabase) {
      container.innerHTML = `
        <div class="auth-logo">
          <div class="auth-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="36" height="36" fill="none"><path d="M 25 15 H 42 A 8 8 0 0 0 58 15 H 75 A 10 10 0 0 1 85 25 V 95 A 10 10 0 0 1 75 105 H 58 A 8 8 0 0 0 42 105 H 25 A 10 10 0 0 1 15 95 V 25 A 10 10 0 0 1 25 15 Z" fill="#16A34A" /><rect x="23" y="27" width="54" height="54" rx="8" ry="8" fill="white" /><circle cx="50" cy="42" r="7" fill="#16A34A" /><path d="M 36 60 C 36 52, 64 52, 64 60 Z" fill="#16A34A" /><rect x="34" y="66" width="32" height="3.5" rx="1.75" fill="#E2EDE9" /><rect x="34" y="73" width="20" height="3.5" rx="1.75" fill="#E2EDE9" /><circle cx="76" cy="90" r="17" fill="white" /><circle cx="76" cy="90" r="13.5" fill="#16A34A" /><path d="M 70 90 L 74 94 L 82 86" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg></div>
          <span class="auth-logo-text">EventPass</span>
        </div>

        <h1 class="auth-title">Create new password</h1>
        <p class="auth-subtitle">Enter your new password below</p>

        <form id="reset-password-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="new-password">New password</label>
            <input type="password" id="new-password" name="password" class="input" placeholder="Min. 8 characters" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm new password</label>
            <input type="password" id="confirm-password" name="confirmPassword" class="input" placeholder="Confirm new password" required>
          </div>
          <div id="reset-pwd-error" class="field-error" style="display:none;margin-bottom:12px;" role="alert"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="reset-pwd-submit">Reset Password</button>
        </form>

        <p class="text-sm text-muted text-center mt-6">
          <a href="/app#/login">Back to sign in</a>
        </p>
      `;

      const form = container.querySelector('#reset-password-form');
      const errorEl = container.querySelector('#reset-pwd-error');
      const btn = container.querySelector('#reset-pwd-submit');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.style.display = 'none';

        const password = form.password.value;
        const confirmPassword = form.confirmPassword.value;

        if (password.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          errorEl.style.display = 'block';
          return;
        }

        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match.';
          errorEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner sm"></span> Resetting...';

        try {
          const { error } = await supabase.auth.updateUser({ password: password });
          if (error) throw error;

          // Clear recovery session and redirect with success param
          await supabase.auth.signOut();
          window.location.href = '/app?reset=success#/login';
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = 'Reset Password';
        }
      });
    }
  </script>
</body>
</html>
