  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'><path d='M 25 15 H 42 A 8 8 0 0 0 58 15 H 75 A 10 10 0 0 1 85 25 V 95 A 10 10 0 0 1 75 105 H 58 A 8 8 0 0 0 42 105 H 25 A 10 10 0 0 1 15 95 V 25 A 10 10 0 0 1 25 15 Z' fill='%2316A34A'/><rect x='23' y='27' width='54' height='54' rx='8' ry='8' fill='white'/><circle cx='50' cy='42' r='7' fill='%2316A34A'/><path d='M 36 60 C 36 52, 64 52, 64 60 Z' fill='%2316A34A'/><rect x='34' y='66' width='32' height='3.5' rx='1.75' fill='%23E2EDE9'/><rect x='34' y='73' width='20' height='3.5' rx='1.75' fill='%23E2EDE9'/><circle cx='76' cy='90' r='17' fill='white'/><circle cx='76' cy='90' r='13.5' fill='%2316A34A'/><path d='M 70 90 L 74 94 L 82 86' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F7FAF8;
      color: #111827;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    .public-nav {
      background: #fff;
      border-bottom: 1px solid #E2EDE9;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .public-nav-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; }
    .public-nav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

    /* Content */
    .content { max-width: 680px; margin: 0 auto; padding: 36px 20px 60px; }

    /* Event banner */
    .event-banner { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; background: #E2EDE9; }

    /* Event header */
    .event-title { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .event-org { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
    .event-meta { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; padding: 16px; background: #fff; border: 1px solid #E2EDE9; border-radius: 10px; }
    .event-meta-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #374151; }
    .event-meta-icon { width: 20px; text-align: center; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; color: #16A34A; }

    /* Status badges */
    .status-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    .status-open { background: #dcfce7; color: #15803d; }
    .status-full { background: #fee2e2; color: #dc2626; }
    .status-waitlist { background: #fef3c7; color: #d97706; }
    .status-closed { background: #f3f4f6; color: #6b7280; }

    /* Form Card */
    .form-card { background: #fff; border: 1px solid #E2EDE9; border-radius: 16px; padding: 28px; margin-top: 20px; }
    .form-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    label { font-size: 13px; font-weight: 500; color: #374151; }
    .required { color: #ef4444; }
    input, select, textarea {
      width: 100%; padding: 0 12px; height: 40px;
      background: #fff; border: 1px solid #E2EDE9; border-radius: 8px;
      color: #111827; font-size: 14px; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    textarea { height: auto; min-height: 80px; padding: 10px 12px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: #16A34A;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }
    .field-error { font-size: 12px; color: #ef4444; margin-top: 4px; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; }
    .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #16A34A; }

    /* Submit button */
    .submit-btn {
      width: 100%; height: 48px; border-radius: 10px;
      background: #16A34A; color: #fff; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover:not(:disabled) { background: #15803D; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Success state */
    .success-card {
      background: #fff; border: 1px solid #E2EDE9; border-radius: 16px;
      overflow: hidden; margin-top: 24px;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .success-header { padding: 28px; background: #F0F7F4; border-bottom: 1px solid #E2EDE9; text-align: center; }
    .success-icon { font-size: 40px; margin-bottom: 12px; }
    .success-title { font-size: 20px; font-weight: 700; color: #166534; margin-bottom: 4px; }
    .success-sub { font-size: 14px; color: #15803d; }

    .ticket-body { padding: 28px; }
    .ticket-detail { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .ticket-detail:last-child { border-bottom: none; }
    .ticket-label { color: #6b7280; }
    .ticket-value { font-weight: 600; text-align: right; font-family: monospace; }

    .qr-container { text-align: center; padding: 20px; background: #f9fafb; border-radius: 10px; margin-top: 16px; }
    .qr-hint { font-size: 12px; color: #9ca3af; margin-top: 8px; }

    .ticket-actions { display: flex; gap: 10px; margin-top: 20px; }
    .ticket-btn {
      flex: 1; height: 40px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; border: 1px solid #E2EDE9;
      background: #fff; color: #374151; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .ticket-btn:hover { background: #f9fafb; }
    .ticket-btn.primary { background: #16A34A; color: #fff; border-color: #16A34A; }
    .ticket-btn.primary:hover { background: #15803D; }

    /* Capacity progress */
    .capacity-bar { height: 4px; background: #f3f4f6; border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .capacity-fill { height: 100%; background: #16A34A; border-radius: 2px; transition: width 0.5s; }

    /* Loading spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    .error-state { text-align: center; padding: 60px 24px; }
    .error-icon { font-size: 40px; margin-bottom: 16px; }
    .error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .error-text { font-size: 14px; color: #6b7280; }

    .form-error { padding: 12px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; font-size: 13px; color: #dc2626; margin-bottom: 16px; }

    @media (max-width: 480px) {
      .content { padding: 20px 16px 40px; }
      .form-card { padding: 20px; }
      .ticket-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav class="public-nav">
    <div class="public-nav-logo">
      <div class="public-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="28" height="28" fill="none"><path d="M 25 15 H 42 A 8 8 0 0 0 58 15 H 75 A 10 10 0 0 1 85 25 V 95 A 10 10 0 0 1 75 105 H 58 A 8 8 0 0 0 42 105 H 25 A 10 10 0 0 1 15 95 V 25 A 10 10 0 0 1 25 15 Z" fill="#16A34A" /><rect x="23" y="27" width="54" height="54" rx="8" ry="8" fill="white" /><circle cx="50" cy="42" r="7" fill="#16A34A" /><path d="M 36 60 C 36 52, 64 52, 64 60 Z" fill="#16A34A" /><rect x="34" y="66" width="32" height="3.5" rx="1.75" fill="#E2EDE9" /><rect x="34" y="73" width="20" height="3.5" rx="1.75" fill="#E2EDE9" /><circle cx="76" cy="90" r="17" fill="white" /><circle cx="76" cy="90" r="13.5" fill="#16A34A" /><path d="M 70 90 L 74 94 L 82 86" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg></div>
      EventPass
    </div>
    <div id="nav-org-name" style="font-size:13px;color:#6b7280;"></div>
  </nav>

  <div class="content" id="page-content">
    <div style="text-align:center;padding:60px 0;">
      <div style="width:32px;height:32px;border:3px solid #E2EDE9;border-top-color:#16A34A;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;"></div>
      <p style="font-size:14px;color:#9ca3af;margin-top:12px;">Loading event...</p>
    </div>
  </div>

  <script type="module">
    const SUPABASE_URL = import.meta?.env?.VITE_SUPABASE_URL
      || document.querySelector('meta[name="supabase-url"]')?.content
      || (() => { throw new Error('SUPABASE_URL not configured. Copy .env.example to .env'); })();

    const SUPABASE_ANON_KEY = import.meta?.env?.VITE_SUPABASE_ANON_KEY
      || document.querySelector('meta[name="supabase-anon-key"]')?.content
      || (() => { throw new Error('SUPABASE_ANON_KEY not configured.'); })();

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Debug log to console
    console.log('Register page URL info:', {
      href: window.location.href,
      pathname: window.location.pathname,
      search: window.location.search,
      hash: window.location.hash
    });

    const params = new URLSearchParams(window.location.search);
    let eventId = params.get('event');

    // Resilient Fallback 1: check hash (e.g. /register#event=...)
    if (!eventId && window.location.hash) {
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      eventId = hashParams.get('event');
    }

    // Resilient Fallback 2: check path segments (e.g. /register/UUID)
    if (!eventId) {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const lastPart = pathParts[pathParts.length - 1];
      const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      if (uuidRegex.test(lastPart)) {
        eventId = lastPart;
      }
    }

    const container = document.getElementById('page-content');

    // ── Load event ──────────────────────────────────────────────
    async function loadEvent() {
      if (!eventId) {
        showError(
          'No event specified', 
          `Please use a valid registration link.<br><br>` +
          `<div style="font-size:12px;color:#6b7280;background:#f3f4f6;padding:12px;border-radius:8px;word-break:break-all;margin-top:10px;text-align:left;font-family:monospace;border:1px solid #e5e7eb;max-width:400px;margin-left:auto;margin-right:auto;">` +
          `<strong style="color:#374151;">Browser URL Debug Info:</strong><br>` +
          `<span style="color:#059669;">href:</span> ${window.location.href}<br>` +
          `<span style="color:#059669;">pathname:</span> ${window.location.pathname}<br>` +
          `<span style="color:#059669;">search:</span> ${window.location.search || '(empty)'}<br>` +
          `<span style="color:#059669;">hash:</span> ${window.location.hash || '(empty)'}` +
          `</div>`
        );
        return;
      }

      try {
        const { data: event, error } = await supabase
          .from('events')
          .select(`
            id, title, description, event_type, status, start_date, end_date,
            timezone, location_name, location_address, is_virtual, virtual_link,
            capacity, is_waitlist_enabled, is_registration_open,
            registration_opens_at, registration_closes_at, banner_url,
            is_free, price, currency, ticket_prefix,
            organizations(id, name, logo_url, primary_color, secondary_color),
            registration_fields(*)
          `)
          .eq('id', eventId)
          .eq('status', 'published')
          .is('deleted_at', null)
          .single();

        if (error || !event) {
          showError('Event not found', 'This event may have ended or the link is incorrect.');
          return;
        }

        const orgRaw = event.organizations;
        const org = Array.isArray(orgRaw) ? orgRaw[0] : orgRaw;
        const primaryColor = org?.primary_color || '#16A34A';

        // Update nav
        document.getElementById('nav-org-name').textContent = org?.name || '';
        document.title = `${event.title} — EventPass`;

        // Registration count for capacity check
        const { count: regCount } = await supabase
          .from('registrations')
          .select('id', { count: 'exact', head: true })
          .eq('event_id', eventId)
          .in('status', ['confirmed', 'pending'])
          .is('deleted_at', null);

        const isFull = event.capacity && regCount >= event.capacity;
        const isOpen = event.is_registration_open && !isFull;
        const canWaitlist = isFull && event.is_waitlist_enabled;

        renderEventPage(event, org, primaryColor, regCount, isOpen, isFull, canWaitlist);
      } catch (err) {
        showError('Error loading event', err.message);
      }
    }

    // ── Render event page ────────────────────────────────────────
    function renderEventPage(event, org, primaryColor, regCount, isOpen, isFull, canWaitlist) {
      const startDate = new Date(event.start_date).toLocaleDateString('en-US', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
      });
      const startTime = new Date(event.start_date).toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit',
      });
      const endTime = event.end_date ? new Date(event.end_date).toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit',
      }) : null;

      const pctFull = event.capacity ? Math.min(Math.round((regCount / event.capacity) * 100), 100) : 0;

      const statusBadge = !isOpen && !canWaitlist
        ? `<span class="status-badge status-closed">Registration Closed</span>`
        : isFull
        ? `<span class="status-badge status-waitlist">Waitlist Open</span>`
        : `<span class="status-badge status-open">Registration Open</span>`;

      container.innerHTML = `
        <div>
          ${event.banner_url ? `<img src="${event.banner_url}" alt="Event banner" class="event-banner">` : ''}

          <h1 class="event-title">${event.title}</h1>
          <div class="event-org">by ${org?.name || 'Organization'} ${statusBadge}</div>

          <div class="event-meta">
            <div class="event-meta-row">
              <span class="event-meta-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
              <span>${startDate}${endTime ? ` · ${startTime} – ${endTime}` : ` at ${startTime}`}</span>
            </div>
            ${event.is_virtual
              ? `<div class="event-meta-row"><span class="event-meta-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span><span>Virtual Event</span></div>`
              : event.location_name
              ? `<div class="event-meta-row"><span class="event-meta-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span><span>${event.location_name}${event.location_address ? ' · ' + event.location_address : ''}</span></div>`
              : ''}
            ${event.capacity ? `
              <div>
                <div class="event-meta-row">
                  <span class="event-meta-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                  <span>${regCount} / ${event.capacity} registered</span>
                </div>
                <div class="capacity-bar"><div class="capacity-fill" style="width:${pctFull}%;background:${primaryColor};"></div></div>
              </div>
            ` : ''}
          </div>

          ${event.description ? `
            <div style="padding:16px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;">
              <p style="font-size:14px;line-height:1.7;color:#374151;white-space:pre-wrap;">${event.description}</p>
            </div>
          ` : ''}
        </div>

        ${isOpen || canWaitlist ? `
          <div class="form-card">
            <div class="form-title">${canWaitlist ? 'Join Waitlist' : 'Register for this Event'}</div>
            <div id="form-error" class="form-error" style="display:none;"></div>
            <form id="reg-form" novalidate>
              <div class="form-group">
                <label for="r-first">First Name <span class="required">*</span></label>
                <input type="text" id="r-first" name="first_name" placeholder="Jane" required autocomplete="given-name">
              </div>
              <div class="form-group">
                <label for="r-last">Last Name <span class="required">*</span></label>
                <input type="text" id="r-last" name="last_name" placeholder="Adeyemi" required autocomplete="family-name">
              </div>
              <div class="form-group">
                <label for="r-email">Email Address <span class="required">*</span></label>
                <input type="email" id="r-email" name="email" placeholder="jane@email.com" required autocomplete="email">
              </div>
              <div class="form-group">
                <label for="r-phone">Phone Number</label>
                <input type="tel" id="r-phone" name="phone" placeholder="+234 801 234 5678" autocomplete="tel">
              </div>

              ${(event.registration_fields || [])
                .filter(field => {
                  const name = (field.field_name || '').toLowerCase();
                  const label = (field.field_label || '').toLowerCase();
                  const builtins = ['first_name', 'last_name', 'email', 'phone', 'first-name', 'last-name', 'email-address', 'phone-number', 'full-name', 'fullname', 'full_name', 'emailaddress', 'phonenumber', 'phone_number', 'mobile', 'telephone'];
                  const builtinLabels = ['first name', 'last name', 'email', 'phone', 'email address', 'phone number', 'full name', 'telephone', 'mobile number'];
                  return !builtins.includes(name) && !builtinLabels.includes(label);
                })
                .sort((a, b) => a.field_order - b.field_order)
                .map(field => renderCustomField(field))
                .join('')}

              <div class="checkbox-row form-group">
                <input type="checkbox" id="r-consent" name="consent" required>
                <label for="r-consent" style="font-size:12px;color:#6b7280;cursor:pointer;">
                  I agree to receive event communications. My data is handled by ${org?.name || 'the organizer'} in accordance with their privacy policy.
                </label>
              </div>

              <button type="submit" class="submit-btn" id="submit-btn" style="background:${primaryColor};display:inline-flex;align-items:center;justify-content:center;gap:6px;">
                <span>${canWaitlist ? 'Join Waitlist' : 'Register Now'}</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>

              <p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:12px;">
                You'll receive a confirmation email with your ticket
              </p>
            </form>
          </div>
        ` : `
          <div style="text-align:center;padding:40px;background:#fff;border:1px solid #E2EDE9;border-radius:16px;margin-top:20px;">
            <div style="display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:#D97706;">
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Registration is closed</div>
            <div style="font-size:14px;color:#6b7280;">Registration for this event is no longer available.</div>
          </div>
        `}

        <div style="text-align:center;margin-top:24px;font-size:12px;color:#9ca3af;">
          Powered by <a href="/" style="color:#16A34A;font-weight:500;">EventPass</a>
        </div>
      `;

      // Handle form submit
      document.getElementById('reg-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        handleRegistration(event, org, primaryColor);
      });
    }

    function renderCustomField(field) {
      const required = field.is_required ? ` <span class="required">*</span>` : '';
      const req = field.is_required ? 'required' : '';

      switch (field.field_type) {
        case 'select':
          return `<div class="form-group">
            <label for="cf-${field.field_name}">${field.field_label}${required}</label>
            <select id="cf-${field.field_name}" name="cf_${field.field_name}" ${req}>
              <option value="">Select an option</option>
              ${(field.options || []).map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
            </select>
          </div>`;
        case 'textarea':
          return `<div class="form-group">
            <label for="cf-${field.field_name}">${field.field_label}${required}</label>
            <textarea id="cf-${field.field_name}" name="cf_${field.field_name}" ${req} placeholder="${field.placeholder || ''}"></textarea>
          </div>`;
        case 'checkbox':
          return `<div class="form-group">
            <label>${field.field_label}${required}</label>
            ${(field.options || []).map(o => `
              <div class="checkbox-row" style="margin-top:6px;">
                <input type="checkbox" name="cf_${field.field_name}[]" value="${o.value}" id="cf-${field.field_name}-${o.value}">
                <label for="cf-${field.field_name}-${o.value}" style="font-weight:400;cursor:pointer;">${o.label}</label>
              </div>
            `).join('')}
          </div>`;
        default:
          return `<div class="form-group">
            <label for="cf-${field.field_name}">${field.field_label}${required}</label>
            <input type="${field.field_type || 'text'}" id="cf-${field.field_name}" name="cf_${field.field_name}"
              placeholder="${field.placeholder || ''}" ${req}>
          </div>`;
      }
    }

    // ── Send confirmation email via Edge Function ─────────────────
    async function sendConfirmationEmail(result, event, org, primaryColor, firstName, email) {
      const startDate = new Date(event.start_date).toLocaleDateString('en-US', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
      });
      const startTime = new Date(event.start_date).toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit',
      });
      const endTime = event.end_date ? new Date(event.end_date).toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit',
      }) : null;
      const eventDateStr = startDate + (endTime ? ` · ${startTime} – ${endTime}` : ` at ${startTime}`);

      const eventLocationStr = event.is_virtual
        ? 'Virtual Event'
        : (event.location_name + (event.location_address ? ' · ' + event.location_address : ''));

      try {
        const { data: emailData, error: emailError } = await supabase.functions.invoke('send-email', {
          body: {
            type: 'registration_confirmed',
            to: email,
            data: {
              firstName,
              eventTitle: event.title,
              eventDate: eventDateStr,
              eventLocation: eventLocationStr,
              ticketNumber: result.ticket_number,
              orgName: org?.name || 'Organization',
              orgColor: primaryColor,
            },
          },
        });

        if (emailError) {
          console.error('Failed to send confirmation email via edge function:', emailError);
        } else {
          console.log('Confirmation email sent successfully:', emailData);
        }
      } catch (err) {
        console.error('Error calling send-email function:', err);
      }
    }

    // ── Handle registration submission ───────────────────────────
    async function handleRegistration(event, org, primaryColor) {
      const form = document.getElementById('reg-form');
      const errEl = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');
      errEl.style.display = 'none';

      const firstName = form.first_name.value.trim();
      const lastName = form.last_name.value.trim();
      const email = form.email.value.trim().toLowerCase();
      const phone = form.phone?.value.trim() || null;
      const consent = form.consent.checked;

      if (!firstName || !lastName) {
        showFormError(errEl, 'Please enter your full name.');
        return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFormError(errEl, 'Please enter a valid email address.');
        return;
      }
      if (!consent) {
        showFormError(errEl, 'Please accept the data consent to continue.');
        return;
      }

      // Collect custom field answers
      const answers = [];
      const customFields = (event.registration_fields || []).filter(field => {
        const name = (field.field_name || '').toLowerCase();
        const label = (field.field_label || '').toLowerCase();
        const builtins = ['first_name', 'last_name', 'email', 'phone', 'first-name', 'last-name', 'email-address', 'phone-number', 'full-name', 'fullname', 'full_name', 'emailaddress', 'phonenumber', 'phone_number', 'mobile', 'telephone'];
        const builtinLabels = ['first name', 'last name', 'email', 'phone', 'email address', 'phone number', 'full name', 'telephone', 'mobile number'];
        return !builtins.includes(name) && !builtinLabels.includes(label);
      });
      customFields.forEach(field => {
        const el = form.querySelector(`[name="cf_${field.field_name}"]`);
        const checkboxEls = form.querySelectorAll(`[name="cf_${field.field_name}[]"]`);

        let answer = '';
        if (checkboxEls.length > 0) {
          answer = Array.from(checkboxEls).filter(cb => cb.checked).map(cb => cb.value).join(', ');
        } else if (el) {
          answer = el.value.trim();
        }

        if (field.is_required && !answer) {
          showFormError(errEl, `Please fill in: ${field.field_label}`);
          return;
        }

        answers.push({
          field_id: field.id,
          field_name: field.field_name,
          answer,
        });
      });

      if (errEl.style.display !== 'none') return; // validation error from loop

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span class="spinner"></span> Registering...`;

      try {
        const { data, error } = await supabase.rpc('register_participant', {
          p_event_id: event.id,
          p_email: email,
          p_first_name: firstName,
          p_last_name: lastName,
          p_phone: phone,
          p_is_walk_in: false,
          p_answers: answers,
        });

        if (error) throw new Error(error.message);
        if (!data.success) throw new Error(data.message);

        // Send confirmation email asynchronously if registration is confirmed
        if (data.status === 'confirmed') {
          sendConfirmationEmail(data, event, org, primaryColor, firstName, email);
        }

        renderSuccessState(data, event, org, primaryColor, firstName);
      } catch (err) {
        showFormError(errEl, err.message.includes('already registered')
          ? 'You are already registered for this event!'
          : err.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<span>Register Now</span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
        submitBtn.style.background = primaryColor;
      }
    }

    // ── Success state ────────────────────────────────────────────
    function renderSuccessState(result, event, org, primaryColor, firstName) {
      const form = document.querySelector('.form-card');
      if (form) form.style.display = 'none';

      const successEl = document.createElement('div');
      successEl.className = 'success-card';
      successEl.innerHTML = `
        <div class="success-header" style="background:${primaryColor}08;border-color:${primaryColor}22;">
          <div class="success-icon" style="display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:#16A34A;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div class="success-title" style="color:${primaryColor};">Registration Confirmed!</div>
          <div class="success-sub" style="color:${primaryColor}cc;">Your spot is reserved, ${firstName}!</div>
        </div>
        <div class="ticket-body">
          <div class="ticket-detail">
            <span class="ticket-label">Event</span>
            <span class="ticket-value">${event.title}</span>
          </div>
          <div class="ticket-detail">
            <span class="ticket-label">Ticket #</span>
            <span class="ticket-value" style="font-size:16px;color:${primaryColor};">${result.ticket_number}</span>
          </div>
          <div class="ticket-detail">
            <span class="ticket-label">Attendee</span>
            <span class="ticket-value">${firstName}</span>
          </div>
          <div class="ticket-detail">
            <span class="ticket-label">Status</span>
            <span class="ticket-value"><span class="status-badge status-open" style="background:${primaryColor}15;color:${primaryColor};">${result.status}</span></span>
          </div>

          <div class="qr-container">
            <canvas id="ticket-qr"></canvas>
            <div class="qr-hint">Show this QR code at the event entrance</div>
          </div>

          <div class="ticket-actions">
            <button class="ticket-btn" onclick="window.print()" style="display:inline-flex;align-items:center;justify-content:center;gap:6px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              Print
            </button>
            <button class="ticket-btn primary" style="background:${primaryColor};border-color:${primaryColor};display:inline-flex;align-items:center;justify-content:center;gap:6px;"
              onclick="document.querySelector('.success-card').style.display='none';document.querySelector('.form-card') && (document.querySelector('.form-card').style.display='none');">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Done
            </button>
          </div>

          <p style="font-size:12px;color:#9ca3af;text-align:center;margin-top:16px;">
            A confirmation email has been sent to your inbox.
          </p>
        </div>
      `;

      document.getElementById('page-content').appendChild(successEl);

      // Render QR code
      const qrContainer = successEl.querySelector('.qr-container');
      if (result.qr_payload && window.QRCode) {
        QRCode.toCanvas(
          document.getElementById('ticket-qr'),
          result.qr_payload,
          { width: 180, margin: 2, errorCorrectionLevel: 'M' },
          (err) => {
            if (err) {
              console.warn(err);
              if (qrContainer) {
                qrContainer.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(result.qr_payload)}&size=180x180&margin=4" alt="QR Code" width="180" height="180">`;
              }
            }
          }
        );
      } else if (result.qr_payload) {
        if (qrContainer) {
          qrContainer.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(result.qr_payload)}&size=180x180&margin=4" alt="QR Code" width="180" height="180">`;
        }
      }

      // Scroll to success
      successEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Helpers ──────────────────────────────────────────────────
    function showError(title, message) {
      container.innerHTML = `
        <div class="error-state">
          <div class="error-icon" style="display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:#D97706;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div class="error-title">${title}</div>
          <div class="error-text">${message}</div>
          <a href="/" style="display:inline-flex;align-items:center;margin-top:16px;color:#16A34A;font-size:14px;gap:4px;text-decoration:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to EventPass
          </a>
        </div>
      `;
    }

    function showFormError(el, msg) {
      el.textContent = msg;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Boot ─────────────────────────────────────────────────────
    loadEvent();
  </script>
</body>
</html>
